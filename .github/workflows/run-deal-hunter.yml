name: Deal Hunter

on:
  schedule:
    # 3x/day: 8am, 2pm, 8pm Eastern (UTC-4 during EDT)
    - cron: '0 12 * * *'
    - cron: '0 18 * * *'
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-deal-hunter:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install beautifulsoup4

      - name: Run Deal Hunter
        run: python live_pull.py

      - name: Commit and push results
        run: |
          git config user.name "Deal Hunter Bot"
          git config user.email "actions@github.com"
          git add live_deals.json buy_signals.json upcoming_releases.json debug_live_pull.txt
          git diff --staged --quiet || git commit -m "Deal Hunter run $(date -u '+%Y-%m-%d %H:%M UTC')"
          git pull --rebase origin main
          git push origin main
