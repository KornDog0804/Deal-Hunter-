name: Deal Hunter

on:
  schedule:
    - cron: '0 12 * * *'
    - cron: '0 18 * * *'
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

# Prevent overlapping runs from fighting over the same files
concurrency:
  group: deal-hunter
  cancel-in-progress: false

jobs:
  run-deal-hunter:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install beautifulsoup4

      - name: Run Deal Hunter
        run: python live_pull.py

      - name: Commit and push results
        run: |
          git config user.name "Deal Hunter Bot"
          git config user.email "actions@github.com"
          git add live_deals.json buy_signals.json upcoming_releases.json debug_live_pull.txt

          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "Deal Hunter run $(date -u '+%Y-%m-%d %H:%M UTC')"

          # Retry push up to 3 times; on conflict, prefer our fresh scrape data
          for i in 1 2 3; do
            if git push origin main; then
              echo "Push succeeded on attempt $i"
              exit 0
            fi
            echo "Push failed on attempt $i, rebasing with fresh-data priority..."
            git pull --rebase -X theirs origin main || git rebase --abort
          done

          echo "Exhausted retries, force-pushing fresh scrape"
          git push --force-with-lease origin main
