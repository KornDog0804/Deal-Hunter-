name: Run Deal Hunter

on:
  workflow_dispatch:
  push:

jobs:
  run:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Pull live deals
        run: python live_pull.py

      - name: Run scorer
        run: python scorer.py

      - name: Run post generator
        run: python post_generator.py

      - name: Commit updated outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add live_deals.json scored_deals.json facebook_posts.txt
          git commit -m "Update live deal outputs" || echo "No changes to commit"
          git push

      - name: Upload outputs
        uses: actions/upload-artifact@v4
        with:
          name: deal-hunter-output
          path: |
            live_deals.json
            scored_deals.json
            facebook_posts.txt
