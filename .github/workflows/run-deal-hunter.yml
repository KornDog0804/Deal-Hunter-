name: Deal Hunter + Discogs Mint Pricing

on:
  schedule:
    - cron: "0 9,14,20 * * *"  # 9 AM, 2 PM, 8 PM Eastern
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  deal_hunter:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --break-system-packages beautifulsoup4 requests

      - name: Run Deal Hunter + Discogs Enrichment
        env:
          DISCOGS_TOKEN: ${{ secrets.DISCOGS_TOKEN }}
        run: |
          cd $GITHUB_WORKSPACE
          python3 live_pull.py

      - name: Commit & push results
        run: |
          git config user.name "Deal Hunter Bot"
          git config user.email "deal-hunter@github.local"
          git add -A
          git commit -m "Deal Hunter run $(date -u '+%Y-%m-%d %H:%M:%S') UTC" || true
          git push

      - name: Upload debug logs
        if: failure()
        uses: actions/upload-artifact@v3
        with:
          name: debug-logs-${{ github.run_id }}
          path: |
            debug_live_pull.txt
            debug_price_lookup.txt
          retention-days: 7
