name: Update Deals

on:
  schedule:
    - cron: '0 9,18 * * *'  # Runs at 9AM & 6PM UTC
  workflow_dispatch:

jobs:
  update-deals:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run deal script
        run: python your_script.py

      - name: Commit changes
        run: |
          git config --global user.name "deal-bot"
          git config --global user.email "bot@korndog.com"
          git add .
          git commit -m "Auto update deals" || echo "No changes"
          git push
